<!doctype html>
<html lang="en">
  <head>
    <title>Heat Threshold Immersive Spatial HUD</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <link type="text/css" rel="stylesheet" href="https://xrblocks.github.io/css/xr.css" />
    <script>
      window.litDisableBundleWarning = true;
    </script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.182.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.182.0/examples/jsm/",
          "troika-three-text": "https://cdn.jsdelivr.net/gh/protectwise/troika@028b81cf308f0f22e5aa8e78196be56ec1997af5/packages/troika-three-text/src/index.js",
          "troika-three-utils": "https://cdn.jsdelivr.net/gh/protectwise/troika@v0.52.4/packages/troika-three-utils/src/index.js",
          "troika-worker-utils": "https://cdn.jsdelivr.net/gh/protectwise/troika@v0.52.4/packages/troika-worker-utils/src/index.js",
          "bidi-js": "https://esm.sh/bidi-js@%5E1.0.2?target=es2022",
          "webgl-sdf-generator": "https://esm.sh/webgl-sdf-generator@1.1.1/es2022/webgl-sdf-generator.mjs",
          "lit": "https://cdn.jsdelivr.net/npm/lit@3/core/lit-core.min.js",
          "lit/": "https://esm.run/lit@3/",
          "xrblocks": "https://cdn.jsdelivr.net/npm/xrblocks@0.14.1/build/xrblocks.js",
          "xrblocks/addons/": "https://cdn.jsdelivr.net/npm/xrblocks@0.14.1/build/addons/"
        }
      }
    </script>
  </head>
  <body>
    <script type="module">
      import 'xrblocks/addons/simulator/SimulatorAddons.js';
      import * as THREE from 'three';
      import * as xb from 'xrblocks';

      // -- Parse plan query params --------------------------------------------------------------
      const urlParams = new URLSearchParams(window.location.search);
      let verdict = urlParams.get('verdict') || 'go';
      let headline = urlParams.get('headline') || 'Route Analysis Normal';
      let reasoning = urlParams.get('reasoning') || 'Environmental conditions are safe.';
      let wetBulb = parseFloat(urlParams.get('wetBulb') || '72');
      let flagRule = urlParams.get('flag') || 'white';
      const watchMode = urlParams.get('watch') === '1';

      let spatialData = { origin: null, waypoints: [], headingNote: 'None', directionsPath: [], navigationArrows: [], sunSamples: [] };
      try {
        const rawSpatial = urlParams.get('spatial');
        if (rawSpatial) spatialData = { ...spatialData, ...JSON.parse(rawSpatial) };
      } catch (e) {
        console.error('Failed to parse spatial data', e);
      }

      let coolingStops = [];
      try {
        const rawStops = urlParams.get('stops');
        if (rawStops) coolingStops = JSON.parse(rawStops);
      } catch (e) {
        console.error('Failed to parse stops', e);
      }

      let suggestedBreaks = [];
      try {
        const rawBreaks = urlParams.get('breaks');
        if (rawBreaks) suggestedBreaks = JSON.parse(rawBreaks);
      } catch (e) {
        console.error('Failed to parse breaks', e);
      }

      const flagColors = {
        white: { hex: 0x9aa0a6, stringColor: '#9aa0a6', label: 'WHITE' },
        green: { hex: 0x34a853, stringColor: '#34a853', label: 'GREEN' },
        yellow: { hex: 0xfbbc05, stringColor: '#fbbc05', label: 'YELLOW' },
        red: { hex: 0xea4335, stringColor: '#ea4335', label: 'RED' },
        black: { hex: 0x202124, stringColor: '#ffffff', label: 'BLACK' }
      };
      let flagInfo = flagColors[flagRule] || flagColors.white;

      // -- Lat/lng projection helpers used by every overlay ------------------------------------
      let projector = null; // { lat0, lng0, scale, centerX, centerZ }
      function project(lat, lng) {
        if (!projector) return new THREE.Vector3(0, 0, 0);
        const dx = (lng - projector.lng0) * projector.lngToX;
        const dz = (lat - projector.lat0) * projector.latToZ;
        return new THREE.Vector3(
          (dx - projector.centerX) * projector.scale,
          0,
          (dz - projector.centerZ) * projector.scale
        );
      }

      // -- Main script --------------------------------------------------------------------------
      class MainScript extends xb.Script {
        init() {
          this.add(new THREE.HemisphereLight(0xffffff, 0x444444, 2.5));
          const dirLight = new THREE.DirectionalLight(0xffffff, 2.0);
          dirLight.position.set(2, 5, 2);
          this.add(dirLight);

          this.routeNodes = [];
          this.breakBeacons = [];
          this.groundArrows = [];
          this.shadeSegments = [];

          this.routeGroup = new THREE.Group();
          this.add(this.routeGroup);

          this.buildSpatialCoordinates();
          this.buildShadeOverlay();
          this.buildGroundArrows();
          this.buildBreakBeacons();
          this.createControlPanel();
          this.createHeadingPanel();
          this.createWatchPanel();

          this.animationTime = 0;

          // Listen for live ticks from the host page.
          window.addEventListener('message', e => {
            const d = e?.data;
            if (!d || d.kind !== 'heat-threshold/live-tick') return;
            this.applyLiveTick(d);
          });
        }

        // ------------------------------------------------------------------------------------
        // Coordinate projection + node rendering (origin, waypoints, cooling stops)
        // ------------------------------------------------------------------------------------
        buildSpatialCoordinates() {
          if (!spatialData.origin) {
            this.buildFallbackDesign();
            return;
          }

          const origin = spatialData.origin;
          const lat0 = origin.lat;
          const lng0 = origin.lng;
          const latToZ = -111320;
          const lngToX = 111320 * Math.cos((lat0 * Math.PI) / 180);

          const coords = [];
          coords.push({ label: origin.label, lat: origin.lat, lng: origin.lng, type: 'origin', details: 'Line Departure Point' });
          (spatialData.waypoints || []).forEach((wp, idx) => {
            coords.push({ label: wp.label, lat: wp.lat, lng: wp.lng, type: 'waypoint', details: `Waypoint Location #${idx + 1}` });
          });
          coolingStops.forEach((stop, idx) => {
            coords.push({
              label: stop.name,
              lat: stop.lat,
              lng: stop.lng,
              type: 'coolingStop',
              details: `Grounded Cooling/Hydration Point: ${stop.why}`,
              streetViewUri: stop.streetViewUri
            });
          });

          // Bounding box across every renderable lat/lng (including breaks + path) so the
          // ground arrows and shade segments share the same scale as the nodes.
          const everyLatLng = coords.map(c => ({ lat: c.lat, lng: c.lng }))
            .concat(suggestedBreaks.map(b => ({ lat: b.lat, lng: b.lng })))
            .concat((spatialData.directionsPath || []).map(p => ({ lat: p.lat, lng: p.lng })));

          let minDX = Infinity, maxDX = -Infinity, minDZ = Infinity, maxDZ = -Infinity;
          everyLatLng.forEach(p => {
            const dx = (p.lng - lng0) * lngToX;
            const dz = (p.lat - lat0) * latToZ;
            if (dx < minDX) minDX = dx;
            if (dx > maxDX) maxDX = dx;
            if (dz < minDZ) minDZ = dz;
            if (dz > maxDZ) maxDZ = dz;
          });
          const centerX = (minDX + maxDX) / 2;
          const centerZ = (minDZ + maxDZ) / 2;
          const spanX = (maxDX - minDX) || 0.1;
          const spanZ = (maxDZ - minDZ) || 0.1;
          const maxSpan = Math.max(spanX, spanZ);
          const scale = 1.0 / maxSpan;

          projector = { lat0, lng0, latToZ, lngToX, centerX, centerZ, scale };

          // Holographic grid
          const gridHelper = new THREE.GridHelper(1.5, 12, 0x475569, 0x334155);
          gridHelper.position.set(0, -0.2, 0);
          this.routeGroup.add(gridHelper);

          // True-north reference rose so users can orient relative to bearings.
          this.addNorthRose();

          // Place nodes
          coords.forEach(coord => {
            const pos = project(coord.lat, coord.lng);

            let size = 0.045, color = 0xf59e0b;
            if (coord.type === 'origin') { size = 0.06; color = 0x3b82f6; }
            else if (coord.type === 'coolingStop') { size = 0.055; color = 0x10b981; }

            const geom = new THREE.SphereGeometry(size, 32, 16);
            const mat = new THREE.MeshPhongMaterial({
              color, emissive: color, emissiveIntensity: 0.25,
              transparent: true, opacity: 0.9, shininess: 90
            });
            const mesh = new THREE.Mesh(geom, mat);
            mesh.position.copy(pos);
            mesh.name = coord.label;
            mesh.ignoreReticleRaycast = false;
            mesh.userData = {
              label: coord.label, type: coord.type, details: coord.details,
              originalColor: color, streetViewUri: coord.streetViewUri
            };
            this.routeGroup.add(mesh);
            this.routeNodes.push(mesh);

            const ringGeom = new THREE.RingGeometry(size * 1.2, size * 1.5, 16);
            ringGeom.rotateX(-Math.PI / 2);
            const ringMat = new THREE.MeshBasicMaterial({ color, side: THREE.DoubleSide, transparent: true, opacity: 0.5 });
            const ringMesh = new THREE.Mesh(ringGeom, ringMat);
            ringMesh.position.copy(pos);
            this.routeGroup.add(ringMesh);
            mesh.userData.ring = ringMesh;
          });

          // Connect waypoints sequentially with holographic projection lines (kept for compass clarity)
          const waypointSeq = coords.filter(c => c.type === 'origin' || c.type === 'waypoint');
          for (let i = 0; i < waypointSeq.length - 1; i++) {
            this.drawHologramLine(project(waypointSeq[i].lat, waypointSeq[i].lng), project(waypointSeq[i + 1].lat, waypointSeq[i + 1].lng));
          }

          this.routeGroup.position.set(0, 1.4, -1.8);
        }

        addNorthRose() {
          // Small "N" tick at +Z forward = -Z in three (we keep latToZ negative so north is -Z).
          const arrow = new THREE.Mesh(
            new THREE.ConeGeometry(0.018, 0.05, 6),
            new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.85 })
          );
          arrow.position.set(0, -0.18, -0.6);
          arrow.rotation.x = -Math.PI / 2;
          this.routeGroup.add(arrow);
        }

        drawHologramLine(p1, p2) {
          const distance = p1.distanceTo(p2);
          if (distance < 1e-4) return;
          const geom = new THREE.CylinderGeometry(0.008, 0.008, distance, 8);
          geom.rotateX(Math.PI / 2);
          const mat = new THREE.MeshBasicMaterial({ color: 0x6366f1, transparent: true, opacity: 0.65 });
          const mesh = new THREE.Mesh(geom, mat);
          mesh.position.copy(p1).add(p2).multiplyScalar(0.5);
          mesh.lookAt(p2);
          this.routeGroup.add(mesh);
        }

        // ------------------------------------------------------------------------------------
        // SunPathSubAgent overlay — color directionsPath segments by shade factor
        // ------------------------------------------------------------------------------------
        buildShadeOverlay() {
          const path = spatialData.directionsPath || [];
          const samples = spatialData.sunSamples || [];
          if (!projector || path.length < 2 || samples.length === 0) return;

          // For each segment in path, pick the nearest sun sample by index ratio.
          for (let i = 0; i < path.length - 1; i++) {
            const a = project(path[i].lat, path[i].lng);
            const b = project(path[i + 1].lat, path[i + 1].lng);
            const ratio = i / Math.max(1, path.length - 1);
            const sample = samples[Math.min(samples.length - 1, Math.floor(ratio * samples.length))];
            const shade = sample?.shadeFactor ?? 0.5;
            // High shade => cooler teal, low shade => hot amber
            const color = new THREE.Color().lerpColors(
              new THREE.Color(0xf97316), // sun-baked
              new THREE.Color(0x06b6d4), // shaded
              shade
            );
            const len = a.distanceTo(b);
            if (len < 1e-4) continue;
            const geom = new THREE.CylinderGeometry(0.012, 0.012, len, 8);
            geom.rotateX(Math.PI / 2);
            const mat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.85 });
            const segment = new THREE.Mesh(geom, mat);
            segment.position.copy(a).add(b).multiplyScalar(0.5);
            segment.position.y = -0.02;
            segment.lookAt(b);
            this.routeGroup.add(segment);
            this.shadeSegments.push(segment);
          }
        }

        // ------------------------------------------------------------------------------------
        // NavigationArrowsSubAgent overlay — ground-anchored heading arrows
        // ------------------------------------------------------------------------------------
        buildGroundArrows() {
          const arrows = spatialData.navigationArrows || [];
          if (!projector || arrows.length === 0) return;

          arrows.forEach(arrow => {
            const pos = project(arrow.lat, arrow.lng);
            // Arrow head + shaft, flat on ground
            const group = new THREE.Group();

            const shaftGeom = new THREE.BoxGeometry(0.012, 0.004, 0.06);
            const shaftMat = new THREE.MeshBasicMaterial({ color: 0x1a73e8, transparent: true, opacity: 0.85 });
            const shaft = new THREE.Mesh(shaftGeom, shaftMat);
            shaft.position.z = -0.01;
            group.add(shaft);

            const headGeom = new THREE.ConeGeometry(0.022, 0.045, 4);
            const headMat = new THREE.MeshBasicMaterial({ color: 0x1a73e8, transparent: true, opacity: 0.95 });
            const head = new THREE.Mesh(headGeom, headMat);
            head.rotation.x = -Math.PI / 2;
            head.position.z = -0.05;
            group.add(head);

            // Bearing is degrees from true north, clockwise. North in our scene is -Z.
            // group.rotateY uses CCW for positive Y in three.js, so negate.
            group.rotation.y = -arrow.bearingDeg * Math.PI / 180;
            group.position.copy(pos);
            group.position.y = -0.18;

            group.userData = {
              label: arrow.instruction,
              type: 'arrow',
              details: `${arrow.maneuver.toUpperCase()} — next maneuver in ${arrow.distanceMeters}m`,
              bearingDeg: arrow.bearingDeg
            };
            this.routeGroup.add(group);
            this.groundArrows.push(group);
          });
        }

        // ------------------------------------------------------------------------------------
        // RefugeBreakSubAgent overlay — pulsing water/shade beacons with countdown labels
        // ------------------------------------------------------------------------------------
        buildBreakBeacons() {
          if (!projector || suggestedBreaks.length === 0) return;

          suggestedBreaks.forEach((b, idx) => {
            const pos = project(b.lat, b.lng);
            const color = b.type === 'water' ? 0x0ea5e9 : b.type === 'shade' ? 0x14b8a6 : 0x8b5cf6;

            // Vertical glowing beam to make the break easy to spot from across the scene.
            const beamGeom = new THREE.CylinderGeometry(0.012, 0.012, 0.45, 12);
            const beamMat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.55 });
            const beam = new THREE.Mesh(beamGeom, beamMat);
            beam.position.copy(pos);
            beam.position.y = 0.05;
            this.routeGroup.add(beam);

            // Floating sphere head
            const orbGeom = new THREE.SphereGeometry(0.04, 24, 12);
            const orbMat = new THREE.MeshPhongMaterial({ color, emissive: color, emissiveIntensity: 0.6, transparent: true, opacity: 0.9 });
            const orb = new THREE.Mesh(orbGeom, orbMat);
            orb.position.copy(pos);
            orb.position.y = 0.28;
            orb.userData = {
              label: `${b.type === 'water' ? '💧 Hydration Break' : b.type === 'shade' ? '🌿 Shade Break' : '🪑 Rest Break'} #${idx + 1}`,
              type: 'breakBeacon',
              details: `${b.label} · +${b.timeOffsetMinutes}min · ${b.durationMinutes}min duration`,
              streetViewUri: b.streetViewUri
            };
            this.routeGroup.add(orb);
            this.breakBeacons.push({ beam, orb, breakSpec: b });
          });
        }

        buildFallbackDesign() {
          const gridHelper = new THREE.GridHelper(1.2, 10, 0x10b981, 0x1e293b);
          gridHelper.position.set(0, -0.1, 0);
          this.routeGroup.add(gridHelper);
          const geom = new THREE.TorusGeometry(0.3, 0.02, 16, 100);
          geom.rotateX(Math.PI / 2);
          const mat = new THREE.MeshPhongMaterial({ color: 0x1a73e8, emissive: 0x1a73e8, emissiveIntensity: 0.2 });
          const ring = new THREE.Mesh(geom, mat);
          this.routeGroup.add(ring);
          this.routeGroup.position.set(0, 1.3, -1.5);
        }

        // ------------------------------------------------------------------------------------
        // Panels
        // ------------------------------------------------------------------------------------
        createControlPanel() {
          this.controlPanel = new xb.SpatialPanel({
            width: 1.6, height: 1.1, backgroundColor: '#0f172aa5', useDefaultPosition: false
          });
          const grid = this.controlPanel.addGrid();

          const headerRow = grid.addRow({ weight: 0.18 });
          headerRow.addText({ text: 'HEAT THRESHOLD SPATIAL INTELLIGENCE', fontColor: '#38bdf8', fontSize: 0.05, textAlign: 'center' });

          const ratingRow = grid.addRow({ weight: 0.2 });
          this.ratingText = ratingRow.addText({
            text: `Peak WBGT: ${wetBulb}°F (${flagRule.toUpperCase()} Flag Rated)`,
            fontColor: flagInfo.stringColor, fontSize: 0.065, textAlign: 'center'
          });

          const detailRow = grid.addRow({ weight: 0.44 });
          this.detailDisplay = new xb.ScrollingTroikaTextView({
            text: `Verdict: ${verdict.toUpperCase()}\n${headline}\nAnalysis: ${reasoning}\n\n💧 ${suggestedBreaks.length} rest beacons · 🧭 ${(spatialData.navigationArrows || []).length} ground arrows\n*Interact with 3D nodes to view waypoint information.`,
            fontSize: 0.032, textAlign: 'center'
          });
          detailRow.add(this.detailDisplay);

          const buttonRow = grid.addRow({ weight: 0.18 });
          const auraButton = buttonRow.addCol({ weight: 0.5 }).addTextButton({
            text: 'Toggle Heat Aura', backgroundColor: '#1e293b', fontColor: '#ffffff', fontSize: 0.03
          });
          auraButton.onTriggered = () => this.toggleThermalAura();

          const speakButton = buttonRow.addCol({ weight: 0.5 }).addTextButton({
            text: 'Read Verdict Audio', backgroundColor: '#1e293b', fontColor: '#ffffff', fontSize: 0.03
          });
          speakButton.onTriggered = () => this.readVerdictVoice();

          this.controlPanel.position.set(-1.1, 1.4, -1.6);
          this.controlPanel.rotation.set(0, Math.PI / 6, 0);
          this.add(this.controlPanel);
        }

        createHeadingPanel() {
          this.headingPanel = new xb.SpatialPanel({
            width: 1.0, height: 0.5, backgroundColor: '#0f172ae5', useDefaultPosition: false
          });
          const grid = this.headingPanel.addGrid();
          grid.addRow({ weight: 0.3 }).addText({
            text: 'COMPASS CALIBRATION', fontColor: '#10b981', fontSize: 0.04
          });
          this.headingNoteText = grid.addRow({ weight: 0.7 }).addText({
            text: spatialData.headingNote || 'Route heading is fully verified.',
            fontColor: '#ffffff', fontSize: 0.035, textAlign: 'center'
          });
          this.headingPanel.position.set(1.1, 1.4, -1.6);
          this.headingPanel.rotation.set(0, -Math.PI / 6, 0);
          this.add(this.headingPanel);
        }

        createWatchPanel() {
          this.watchPanel = new xb.SpatialPanel({
            width: 0.9, height: 0.32, backgroundColor: '#0f172af2', useDefaultPosition: false
          });
          const grid = this.watchPanel.addGrid();
          grid.addRow({ weight: 0.4 }).addText({
            text: watchMode ? '● LIVE WATCH ENGAGED' : 'LIVE WATCH STANDBY',
            fontColor: watchMode ? '#34a853' : '#94a3b8', fontSize: 0.038, textAlign: 'center'
          });
          this.watchStatusText = grid.addRow({ weight: 0.6 }).addText({
            text: watchMode ? 'Awaiting first weather tick…' : 'Toggle Live Watch on the dashboard to stream weather updates.',
            fontColor: '#cbd5e1', fontSize: 0.028, textAlign: 'center'
          });
          this.watchPanel.position.set(0, 0.85, -1.6);
          this.add(this.watchPanel);
        }

        // ------------------------------------------------------------------------------------
        // Live tick handler
        // ------------------------------------------------------------------------------------
        applyLiveTick(tick) {
          wetBulb = tick.wetBulb ?? wetBulb;
          flagRule = tick.flag ?? flagRule;
          verdict = tick.verdict ?? verdict;
          headline = tick.headline ?? headline;
          reasoning = tick.reasoning ?? reasoning;
          flagInfo = flagColors[flagRule] || flagColors.white;

          if (this.ratingText?.setText) {
            this.ratingText.setText(`Peak WBGT: ${wetBulb}°F (${flagRule.toUpperCase()} Flag Rated) · LIVE`);
          }
          if (this.detailDisplay?.setText) {
            this.detailDisplay.setText(
              `Verdict: ${verdict.toUpperCase()}\n${headline}\nAnalysis: ${reasoning}\n\n💧 ${suggestedBreaks.length} rest beacons · 🧭 ${(spatialData.navigationArrows || []).length} ground arrows`
            );
          }
          if (this.watchStatusText?.setText) {
            const at = new Date(tick.fetchedAt || Date.now()).toLocaleTimeString();
            this.watchStatusText.setText(`Tick @ ${at} · WBGT ${wetBulb}°F · ${flagRule.toUpperCase()}`);
          }

          // Recolor break beacons to reflect escalating severity.
          this.breakBeacons.forEach(({ beam, orb }) => {
            beam.material.color.setHex(flagInfo.hex);
            orb.material.emissive.setHex(flagInfo.hex);
            orb.material.color.setHex(flagInfo.hex);
          });

          xb.core.sound.soundSynthesizer.playPresetTone('CLICK', 0.4);
        }

        toggleThermalAura() {
          xb.core.sound.soundSynthesizer.playPresetTone('BEEP', 0.6);
          this.auraActive = !this.auraActive;
          this.routeNodes.forEach(node => {
            if (this.auraActive) {
              node.material.emissiveIntensity = 0.85;
              node.scale.setScalar(1.2);
              if (node.userData.ring) node.userData.ring.scale.setScalar(1.5);
            } else {
              node.material.emissiveIntensity = 0.25;
              node.scale.setScalar(1.0);
              if (node.userData.ring) node.userData.ring.scale.setScalar(1.0);
            }
          });
          const currentMsg = this.auraActive ? 'Thermal footprint coverage visualizer ACTIVATED.' : 'Thermal footprint coverage visualizer DEACTIVATED.';
          this.detailDisplay.setText(`${currentMsg}\n\nVerdict: ${verdict.toUpperCase()}\n${headline}\nAnalysis: ${reasoning}`);
        }

        readVerdictVoice() {
          const alertSpeech = `Heat Threshold Advisory. Headline: ${headline}. Wet-bulb peak is ${wetBulb} degrees fahrenheit, falling under the ${flagRule} flag. Recommended verdict is to ${verdict}.`;
          xb.core.sound.soundSynthesizer.playPresetTone('CLICK', 0.5);
          if (xb.core.sound.speechSynthesizer) {
            xb.core.sound.speechSynthesizer.speak(alertSpeech);
          } else if (window.speechSynthesis) {
            const utterance = new SpeechSynthesisUtterance(alertSpeech);
            window.speechSynthesis.speak(utterance);
          }
        }

        onSelectStart(event) {
          const controller = event.target;
          for (const node of this.routeNodes) {
            const intersection = xb.core.user.select(node, controller);
            if (intersection) {
              this.routeNodes.forEach(n => {
                n.material.color.setHex(n.userData.originalColor);
                n.material.emissiveIntensity = 0.25;
              });
              node.material.color.setHex(0x06b6d4);
              node.material.emissiveIntensity = 0.8;
              xb.core.sound.soundSynthesizer.playPresetTone('CLICK', 0.8);

              const sv = node.userData.streetViewUri ? `\n\nFirst-person view: ${node.userData.streetViewUri}` : '';
              const textMessage = `📌 SELECTED NODE: ${node.userData.label.toUpperCase()}\n\nRole: ${node.userData.details}${sv}\n\nPeak Heat Stress: ${wetBulb}°F (${flagRule.toUpperCase()} Level)`;
              this.detailDisplay.setText(textMessage);
              return;
            }
          }

          // Also let break beacons be selectable
          for (const { orb } of this.breakBeacons) {
            const intersection = xb.core.user.select(orb, controller);
            if (intersection) {
              const sv = orb.userData.streetViewUri ? `\n\nFirst-person view: ${orb.userData.streetViewUri}` : '';
              this.detailDisplay.setText(`${orb.userData.label}\n\n${orb.userData.details}${sv}`);
              xb.core.sound.soundSynthesizer.playPresetTone('CLICK', 0.7);
              return;
            }
          }
        }

        update() {
          this.animationTime += xb.getDeltaTime();
          this.routeGroup.rotation.y = 0.05 * Math.sin(this.animationTime * 0.2);

          // Pulse route node rings
          const scale = 1.0 + 0.15 * Math.sin(this.animationTime * 3.0);
          this.routeNodes.forEach(node => {
            if (node.userData.ring) {
              if (this.auraActive) node.userData.ring.scale.setScalar(scale * 1.5);
              else node.userData.ring.scale.setScalar(scale);
            }
          });

          // Pulse break beacons independently — faster cadence = more urgency
          const breakPulse = 1.0 + 0.25 * Math.sin(this.animationTime * 5.0);
          this.breakBeacons.forEach(({ orb, beam }) => {
            orb.scale.setScalar(breakPulse);
            beam.material.opacity = 0.35 + 0.25 * Math.sin(this.animationTime * 4.0);
          });

          // Travel pulse along ground arrows: opacity wave so they appear to chase the user forward.
          this.groundArrows.forEach((arrow, idx) => {
            const phase = (this.animationTime * 2 - idx * 0.25) % 2;
            const wave = phase < 1 ? phase : 2 - phase;
            arrow.children.forEach(c => { if (c.material) c.material.opacity = 0.5 + 0.5 * wave; });
          });
        }
      }

      document.addEventListener('DOMContentLoaded', function () {
        const options = new xb.Options();
        options.enableUI();
        options.enableReticles();
        options.enableControllers();
        options.sound.speechSynthesizer.enabled = true;
        options.xrButton.showEnterSimulatorButton = false;

        xb.add(new MainScript());
        xb.init(options);
      });
    </script>
  </body>
</html>
