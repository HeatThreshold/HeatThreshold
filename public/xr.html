<!doctype html>
<html lang="en">
  <head>
    <title>Heat Threshold Immersive Spatial HUD</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <link type="text/css" rel="stylesheet" href="https://xrblocks.github.io/css/xr.css" />
    <script>
      window.litDisableBundleWarning = true;
    </script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.182.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.182.0/examples/jsm/",
          "troika-three-text": "https://cdn.jsdelivr.net/gh/protectwise/troika@028b81cf308f0f22e5aa8e78196be56ec1997af5/packages/troika-three-text/src/index.js",
          "troika-three-utils": "https://cdn.jsdelivr.net/gh/protectwise/troika@v0.52.4/packages/troika-three-utils/src/index.js",
          "troika-worker-utils": "https://cdn.jsdelivr.net/gh/protectwise/troika@v0.52.4/packages/troika-worker-utils/src/index.js",
          "bidi-js": "https://esm.sh/bidi-js@%5E1.0.2?target=es2022",
          "webgl-sdf-generator": "https://esm.sh/webgl-sdf-generator@1.1.1/es2022/webgl-sdf-generator.mjs",
          "lit": "https://cdn.jsdelivr.net/npm/lit@3/core/lit-core.min.js",
          "lit/": "https://esm.run/lit@3/",
          "xrblocks": "https://cdn.jsdelivr.net/npm/xrblocks@0.14.1/build/xrblocks.js",
          "xrblocks/addons/": "https://cdn.jsdelivr.net/npm/xrblocks@0.14.1/build/addons/"
        }
      }
    </script>
  </head>
  <body>
    <script type="module">
      import 'xrblocks/addons/simulator/SimulatorAddons.js';
      import * as THREE from 'three';
      import * as xb from 'xrblocks';

      // Parse plan query params reactively
      const urlParams = new URLSearchParams(window.location.search);
      const verdict = urlParams.get('verdict') || 'go';
      const headline = urlParams.get('headline') || 'Route Analysis Normal';
      const reasoning = urlParams.get('reasoning') || 'Environmental conditions are safe.';
      const wetBulb = parseFloat(urlParams.get('wetBulb') || '72');
      const flagRule = urlParams.get('flag') || 'white';
      
      let spatialData = { origin: null, waypoints: [], headingNote: 'None' };
      try {
        const rawSpatial = urlParams.get('spatial');
        if (rawSpatial) {
          spatialData = JSON.parse(rawSpatial);
        }
      } catch (e) {
        console.error('Failed to parse spatial data', e);
      }

      let coolingStops = [];
      try {
        const rawStops = urlParams.get('stops');
        if (rawStops) {
          coolingStops = JSON.parse(rawStops);
        }
      } catch (e) {
        console.error('Failed to parse stops', e);
      }

      // Predefined flag visual properties
      const flagInfo = {
        white: { hex: 0x9aa0a6, stringColor: '#9aa0a6', borderHex: 0xcccccc, label: 'WHITE' },
        green: { hex: 0x34a853, stringColor: '#34a853', borderHex: 0xa3cfbb, label: 'GREEN' },
        yellow: { hex: 0xfbbc05, stringColor: '#fbbc05', borderHex: 0xfde293, label: 'YELLOW' },
        red: { hex: 0xea4335, stringColor: '#ea4335', borderHex: 0xf5c2c1, label: 'RED' },
        black: { hex: 0x202124, stringColor: '#ffffff', borderHex: 0x111111, label: 'BLACK' }
      }[flagRule] || { hex: 0x9aa0a6, stringColor: '#9aa0a6', borderHex: 0xcccccc, label: 'WHITE' };

      class MainScript extends xb.Script {
        init() {
          // Setup lighting
          this.add(new THREE.HemisphereLight(0xffffff, 0x444444, 2.5));
          const dirLight = new THREE.DirectionalLight(0xffffff, 2.0);
          dirLight.position.set(2, 5, 2);
          this.add(dirLight);

          // Interactive orbs array
          this.routeNodes = [];

          // Group to contain entire layout and enable rotation
          this.routeGroup = new THREE.Group();
          this.add(this.routeGroup);

          // Extracted coordinate projection
          this.buildSpatialCoordinates();

          // Main timeline feedback details panel
          this.createControlPanel();

          // Create heading hologram panel
          this.createHeadingPanel();

          // Animation values
          this.animationTime = 0;
        }

        buildSpatialCoordinates() {
          if (!spatialData.origin) {
            // Draw fallback concentric rings if no spatial data is available
            this.buildFallbackDesign();
            return;
          }

          const origin = spatialData.origin;
          const lat0 = origin.lat;
          const lng0 = origin.lng;

          // 1 degree latitude ~ 111320 meters
          // 1 degree longitude ~ 111320 * cos(lat) meters
          const latToZ = -111320; // negative Z is forward In Three.js
          const lngToX = 111320 * Math.cos(lat0 * Math.PI / 180);

          const coords = [];
          
          // Add origin
          coords.push({
            label: origin.label,
            x: 0,
            z: 0,
            type: 'origin',
            details: 'Line Departure Point'
          });

          // Add waypoints
          spatialData.waypoints.forEach((wp, idx) => {
            const dx = (wp.lng - lng0) * lngToX;
            const dz = (wp.lat - lat0) * latToZ;
            coords.push({
              label: wp.label,
              x: dx,
              z: dz,
              type: 'waypoint',
              details: `Waypoint Location #${idx + 1}`
            });
          });

          // Add cooling stops
          coolingStops.forEach((stop, idx) => {
            const dx = (stop.lng - lng0) * lngToX;
            const dz = (stop.lat - lat0) * latToZ;
            coords.push({
              label: stop.name,
              x: dx,
              z: dz,
              type: 'coolingStop',
              details: `Grounded Cooling/Hydration Point: ${stop.why}`
            });
          });

          // Compute bounding box for perfect proportional auto-scaling
          let minX = Infinity, maxX = -Infinity;
          let minZ = Infinity, maxZ = -Infinity;

          coords.forEach(c => {
            if (c.x < minX) minX = c.x;
            if (c.x > maxX) maxX = c.x;
            if (c.z < minZ) minZ = c.z;
            if (c.z > maxZ) maxZ = c.z;
          });

          const centerX = (minX + maxX) / 2;
          const centerZ = (minZ + maxZ) / 2;
          const spanX = maxX - minX || 0.1;
          const spanZ = maxZ - minZ || 0.1;
          const maxSpan = Math.max(spanX, spanZ);

          // Restrict bounds so it floats elegantly in a 1.2m diameter circle
          const scaleFactor = 1.0 / maxSpan;

          // Create base holographic grid representation
          const gridHelper = new THREE.GridHelper(1.5, 12, 0x475569, 0x334155);
          gridHelper.position.set(0, -0.2, 0);
          this.routeGroup.add(gridHelper);

          // Project waypoints in 3D
          coords.forEach((coord, i) => {
            const projX = (coord.x - centerX) * scaleFactor;
            const projZ = (coord.z - centerZ) * scaleFactor;

            // Generate specific geometric node representing point
            let size = 0.05;
            let color = 0x1a73e8;

            if (coord.type === 'origin') {
              size = 0.06;
              color = 0x3b82f6; // vibrant blue
            } else if (coord.type === 'coolingStop') {
              size = 0.055;
              color = 0x10b981; // emerald green
            } else {
              size = 0.045;
              color = 0xf59e0b; // amber yellow
            }

            const geom = new THREE.SphereGeometry(size, 32, 16);
            const mat = new THREE.MeshPhongMaterial({
              color: color,
              emissive: color,
              emissiveIntensity: 0.25,
              transparent: true,
              opacity: 0.9,
              shininess: 90
            });
            const mesh = new THREE.Mesh(geom, mat);
            mesh.position.set(projX, 0, projZ);
            mesh.name = coord.label;

            // Wrap for select gestures
            mesh.ignoreReticleRaycast = false;
            // Tag with details
            mesh.userData = {
              label: coord.label,
              type: coord.type,
              details: coord.details,
              originalColor: color
            };

            this.routeGroup.add(mesh);
            this.routeNodes.push(mesh);

            // Add simple glowing rings for decoration
            const ringGeom = new THREE.RingGeometry(size * 1.2, size * 1.5, 16);
            ringGeom.rotateX(-Math.PI / 2);
            const ringMat = new THREE.MeshBasicMaterial({
              color: color,
              side: THREE.DoubleSide,
              transparent: true,
              opacity: 0.5
            });
            const ringMesh = new THREE.Mesh(ringGeom, ringMat);
            ringMesh.position.set(projX, 0, projZ);
            this.routeGroup.add(ringMesh);
            mesh.userData.ring = ringMesh;
          });

          // Connect waypoints sequentially with holographic projection lines
          const waypointsList = coords.filter(c => c.type === 'origin' || c.type === 'waypoint');
          for (let i = 0; i < waypointsList.length - 1; i++) {
            const p1 = waypointsList[i];
            const p2 = waypointsList[i + 1];

            const startX = (p1.x - centerX) * scaleFactor;
            const startZ = (p1.z - centerZ) * scaleFactor;
            const endX = (p2.x - centerX) * scaleFactor;
            const endZ = (p2.z - centerZ) * scaleFactor;

            const startVec = new THREE.Vector3(startX, 0, startZ);
            const endVec = new THREE.Vector3(endX, 0, endZ);

            this.drawHologramLine(startVec, endVec);
          }

          // Initial placement in front of user
          this.routeGroup.position.set(0, 1.4, -1.8);
        }

        drawHologramLine(p1, p2) {
          const distance = p1.distanceTo(p2);
          const geom = new THREE.CylinderGeometry(0.008, 0.008, distance, 8);
          // Rotate cylinder to lie along the direction
          geom.rotateX(Math.PI / 2);
          
          const mat = new THREE.MeshBasicMaterial({
            color: 0x6366f1, // indigo bridge
            transparent: true,
            opacity: 0.65
          });

          const mesh = new THREE.Mesh(geom, mat);
          mesh.position.copy(p1).add(p2).multiplyScalar(0.5);
          mesh.lookAt(p2);
          
          this.routeGroup.add(mesh);
        }

        buildFallbackDesign() {
          // Simple visual target rings when no route is selected
          const gridHelper = new THREE.GridHelper(1.2, 10, 0x10b981, 0x1e293b);
          gridHelper.position.set(0, -0.1, 0);
          this.routeGroup.add(gridHelper);

          const geom = new THREE.TorusGeometry(0.3, 0.02, 16, 100);
          geom.rotateX(Math.PI / 2);
          const mat = new THREE.MeshPhongMaterial({ color: 0x1a73e8, emissive: 0x1a73e8, emissiveIntensity: 0.2 });
          const ring = new THREE.Mesh(geom, mat);
          this.routeGroup.add(ring);

          this.routeGroup.position.set(0, 1.3, -1.5);
        }

        createControlPanel() {
          this.controlPanel = new xb.SpatialPanel({
            width: 1.6,
            height: 1.1,
            backgroundColor: '#0f172aa5',
            useDefaultPosition: false
          });

          const grid = this.controlPanel.addGrid();
          
          // Header Row
          const headerRow = grid.addRow({ weight: 0.2 });
          headerRow.addText({
            text: `HEAT THRESHOLD SPATIAL INTELLIGENCE`,
            fontColor: '#38bdf8',
            fontSize: 0.05,
            textAlign: 'center'
          });

          // State Status Row
          const ratingRow = grid.addRow({ weight: 0.22 });
          this.ratingText = ratingRow.addText({
            text: `Peak WBGT: ${wetBulb}°F (${flagRule.toUpperCase()} Flag Rated)`,
            fontColor: flagInfo.stringColor,
            fontSize: 0.065,
            textAlign: 'center'
          });

          // Active details row with scrolling description
          const detailRow = grid.addRow({ weight: 0.42 });
          this.detailDisplay = new xb.ScrollingTroikaTextView({
            text: `Verdict: ${verdict.toUpperCase()}\n${headline}\nAnalysis: ${reasoning}\n\n*Interact with 3D nodes to view waypoint information.`,
            fontSize: 0.032,
            textAlign: 'center'
          });
          detailRow.add(this.detailDisplay);

          // Interaction row
          const buttonRow = grid.addRow({ weight: 0.16 });
          const auraButton = buttonRow.addCol({ weight: 0.5 }).addTextButton({
            text: 'Toggle Heat Aura',
            backgroundColor: '#1e293b',
            fontColor: '#ffffff',
            fontSize: 0.03
          });

          auraButton.onTriggered = () => {
            this.toggleThermalAura();
          };

          const speakButton = buttonRow.addCol({ weight: 0.5 }).addTextButton({
            text: 'Read Verdict Audio',
            backgroundColor: '#1e293b',
            fontColor: '#ffffff',
            fontSize: 0.03
          });

          speakButton.onTriggered = () => {
            this.readVerdictVoice();
          };

          // Place floating panel to the left of the main map
          this.controlPanel.position.set(-1.1, 1.4, -1.6);
          this.controlPanel.rotation.set(0, Math.PI / 6, 0);
          this.add(this.controlPanel);
        }

        createHeadingPanel() {
          this.headingPanel = new xb.SpatialPanel({
            width: 1.0,
            height: 0.5,
            backgroundColor: '#0f172ae5',
            useDefaultPosition: false
          });

          const grid = this.headingPanel.addGrid();
          grid.addRow({ weight: 0.3 }).addText({
            text: 'COMPASS CALIBRATION',
            fontColor: '#10b981',
            fontSize: 0.04
          });

          this.headingNoteText = grid.addRow({ weight: 0.7 }).addText({
            text: spatialData.headingNote || 'Route heading is fully verified.',
            fontColor: '#ffffff',
            fontSize: 0.035,
            textAlign: 'center'
          });

          // Place floating panel to the right of the main map
          this.headingPanel.position.set(1.1, 1.4, -1.6);
          this.headingPanel.rotation.set(0, -Math.PI / 6, 0);
          this.add(this.headingPanel);
        }

        toggleThermalAura() {
          // Play micro sound feedback
          xb.core.sound.soundSynthesizer.playPresetTone('BEEP', 0.6);

          this.auraActive = !this.auraActive;
          this.routeNodes.forEach(node => {
            if (this.auraActive) {
              node.material.emissiveIntensity = 0.85;
              node.scale.setScalar(1.2);
              if (node.userData.ring) {
                node.userData.ring.scale.setScalar(1.5);
              }
            } else {
              node.material.emissiveIntensity = 0.25;
              node.scale.setScalar(1.0);
              if (node.userData.ring) {
                node.userData.ring.scale.setScalar(1.0);
              }
            }
          });

          const currentMsg = this.auraActive ? "Thermal footprint coverage visualizer ACTIVATED." : "Thermal footprint coverage visualizer DEACTIVATED.";
          this.detailDisplay.setText(`${currentMsg}\n\nVerdict: ${verdict.toUpperCase()}\n${headline}\nAnalysis: ${reasoning}`);
        }

        readVerdictVoice() {
          // Use core SpeechSynthesizer if enabled, else window.speechSynthesis
          const alertSpeech = `Heat Threshold Advisory. Headline: ${headline}. Wet-bulb peak is ${wetBulb} degrees fahrenheit, falling under the ${flagRule} flag. Recommended verdict is to ${verdict}.`;
          xb.core.sound.soundSynthesizer.playPresetTone('CLICK', 0.5);

          if (xb.core.sound.speechSynthesizer) {
            xb.core.sound.speechSynthesizer.speak(alertSpeech);
          } else if (window.speechSynthesis) {
            const utterance = new SpeechSynthesisUtterance(alertSpeech);
            window.speechSynthesis.speak(utterance);
          }
        }

        onSelectStart(event) {
          const controller = event.target;
          
          // Check if user clicked any of our custom interactive 3D nodes
          for (const node of this.routeNodes) {
            const intersection = xb.core.user.select(node, controller);
            if (intersection) {
              // Highlight the selected node
              this.routeNodes.forEach(n => {
                n.material.color.setHex(n.userData.originalColor);
                n.material.emissiveIntensity = 0.25;
              });

              node.material.color.setHex(0x06b6d4); // highlight color (cyan)
              node.material.emissiveIntensity = 0.8;

              // Play a cute audio CLICK
              xb.core.sound.soundSynthesizer.playPresetTone('CLICK', 0.8);

              // Update the UI panel to show details about this node
              const textMessage = `📌 SELECTED NODE: ${node.userData.label.toUpperCase()}\n\nRole: ${node.userData.details}\n\nEnvironment Coordinate verified correctly.\n\nPeak Heat Stress: ${wetBulb}°F (${flagRule.toUpperCase()} Level)`;
              this.detailDisplay.setText(textMessage);
              return;
            }
          }
        }

        update() {
          // Rotate routeGroup slightly over time to look futuristic
          this.animationTime += xb.getDeltaTime();
          this.routeGroup.rotation.y = 0.05 * Math.sin(this.animationTime * 0.2);

          // Breathe the node rings
          const scale = 1.0 + 0.15 * Math.sin(this.animationTime * 3.0);
          this.routeNodes.forEach(node => {
            if (node.userData.ring) {
              if (this.auraActive) {
                node.userData.ring.scale.setScalar(scale * 1.5);
              } else {
                node.userData.ring.scale.setScalar(scale);
              }
            }
          });
        }
      }

      document.addEventListener('DOMContentLoaded', function () {
        const options = new xb.Options();
        options.enableUI();
        options.enableReticles();
        options.enableControllers();
        options.sound.speechSynthesizer.enabled = true;
        
        // Hide the standard bottom enter XR button to keep layout stunning inside the iframe, 
        // but allow entering session nicely.
        options.xrButton.showEnterSimulatorButton = false;

        xb.add(new MainScript());
        xb.init(options);
      });
    </script>
  </body>
</html>
