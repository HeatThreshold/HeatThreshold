<!doctype html>
<html lang="en">
  <head>
    <title>Heat Threshold Immersive Spatial HUD</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <link type="text/css" rel="stylesheet" href="https://xrblocks.github.io/css/xr.css" />
    <script>
      window.litDisableBundleWarning = true;
    </script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.182.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.182.0/examples/jsm/",
          "troika-three-text": "https://cdn.jsdelivr.net/gh/protectwise/troika@028b81cf308f0f22e5aa8e78196be56ec1997af5/packages/troika-three-text/src/index.js",
          "troika-three-utils": "https://cdn.jsdelivr.net/gh/protectwise/troika@v0.52.4/packages/troika-three-utils/src/index.js",
          "troika-worker-utils": "https://cdn.jsdelivr.net/gh/protectwise/troika@v0.52.4/packages/troika-worker-utils/src/index.js",
          "bidi-js": "https://esm.sh/bidi-js@%5E1.0.2?target=es2022",
          "webgl-sdf-generator": "https://esm.sh/webgl-sdf-generator@1.1.1/es2022/webgl-sdf-generator.mjs",
          "lit": "https://esm.run/lit@3",
          "lit/": "https://esm.run/lit@3/",
          "xrblocks": "https://cdn.jsdelivr.net/npm/xrblocks@0.14.1/build/xrblocks.js",
          "xrblocks/addons/": "https://cdn.jsdelivr.net/npm/xrblocks@0.14.1/build/addons/",
          "3d-tiles-renderer": "https://esm.sh/3d-tiles-renderer@0.4.25?external=three",
          "3d-tiles-renderer/plugins": "https://esm.sh/3d-tiles-renderer@0.4.25/plugins?external=three"
        }
      }
    </script>
  </head>
  <body>
    <script type="module">
      // -- Transient-failure shield ------------------------------------------------------------
      // When the network flaps during xrblocks bootstrap, three things break:
      //   1. troika-three-text fetch fails → xrblocks falls back to HTML text (OK, but noisy).
      //   2. tile.googleapis.com DNS fails → 3D Tiles floor doesn't load (we already catch this).
      //   3. xrblocks simulator GLB fails → simulator state is half-built. If the user then
      //      touches the simulator settings panel, SimulatorUserMode.onModeDeactivated throws
      //      `Cannot read properties of undefined (reading 'mouseController')` — a red console
      //      error that visibly pollutes a stage demo. We suppress only that exact pattern so
      //      genuine bugs still surface.
      const SUPPRESS_PATTERNS = [
        /mouseController/,
        /XREmulatorscene/i,
        /troika-three-text/i,
        /tile\.googleapis\.com/i
      ];
      const shouldSuppress = (msg) => {
        if (!msg) return false;
        const s = String(msg);
        return SUPPRESS_PATTERNS.some(re => re.test(s));
      };
      window.addEventListener('error', (event) => {
        const msg = event?.error?.message || event?.message || '';
        if (shouldSuppress(msg)) {
          console.warn('[XR] Suppressed transient xrblocks/CDN error:', msg);
          event.preventDefault();
          event.stopImmediatePropagation();
        }
      }, true);
      window.addEventListener('unhandledrejection', (event) => {
        const msg = event?.reason?.message || event?.reason || '';
        if (shouldSuppress(msg)) {
          console.warn('[XR] Suppressed transient xrblocks/CDN rejection:', msg);
          event.preventDefault();
        }
      });

      import 'xrblocks/addons/simulator/SimulatorAddons.js';
      import * as THREE from 'three';
      import * as xb from 'xrblocks';
      import { TilesRenderer } from '3d-tiles-renderer';
      import { GoogleCloudAuthPlugin, ReorientationPlugin, TileCompressionPlugin, TilesFadePlugin } from '3d-tiles-renderer/plugins';

      // -- Parse plan query params --------------------------------------------------------------
      const urlParams = new URLSearchParams(window.location.search);
      let verdict = urlParams.get('verdict') || 'go';
      let headline = urlParams.get('headline') || 'Route Analysis Normal';
      let reasoning = urlParams.get('reasoning') || 'Environmental conditions are safe.';
      let wetBulb = parseFloat(urlParams.get('wetBulb') || '72');
      let flagRule = urlParams.get('flag') || 'white';
      const watchMode = urlParams.get('watch') === '1';
      const gmpKey = urlParams.get('gmpKey') || '';
      const activityText = urlParams.get('activity') || '';
      const startTimeStr = urlParams.get('time') || '14:30';
      // Experience mode: 'static' (default — just rotate gently),
      //                  'preview' (simulated journey — advance time per stop,
      //                             project wet-bulb at arrival from diurnal
      //                             curve, recolor node by projected flag),
      //                  'live'    (geolocation-driven "you are here" beacon).
      const xrMode = urlParams.get('mode') === 'preview' || urlParams.get('mode') === 'live'
        ? urlParams.get('mode')
        : 'static';

      // --- Journey simulation helpers (preview mode) ---------------------------
      // Walking-pace defaults; the activity string can bump us to biking pace.
      const isBiking = /bike|biking|cycling/i.test(activityText);
      const PACE_MPS = isBiking ? 4.5 : 1.35;

      // Parse "14:30" / "2:30 PM" / "14:30:00" to a minutes-since-midnight integer.
      function parseTimeToMinutes(s) {
        if (!s) return 14 * 60 + 30;
        const ampmMatch = s.match(/(\d{1,2}):(\d{2})\s*(AM|PM)?/i);
        if (!ampmMatch) return 14 * 60 + 30;
        let h = parseInt(ampmMatch[1], 10);
        const m = parseInt(ampmMatch[2], 10);
        const ampm = (ampmMatch[3] || '').toUpperCase();
        if (ampm === 'PM' && h !== 12) h += 12;
        if (ampm === 'AM' && h === 12) h = 0;
        return h * 60 + m;
      }
      function formatMinutesToClock(mins) {
        const m = ((mins % 1440) + 1440) % 1440;
        const h24 = Math.floor(m / 60);
        const mm = String(m % 60).padStart(2, '0');
        const ampm = h24 >= 12 ? 'PM' : 'AM';
        const h12 = h24 % 12 === 0 ? 12 : h24 % 12;
        return `${h12}:${mm} ${ampm}`;
      }
      const journeyStartMinutes = parseTimeToMinutes(startTimeStr);

      // Diurnal wet-bulb curve scaled by the synthesis-reported peak. Peak at 3PM,
      // trough at 5AM, swing range scales with peak (hotter days = bigger swing).
      // This mirrors the dashboard's trendData logic so the preview matches the
      // sparkline curve a user just looked at.
      function projectWetBulbAt(absoluteMinutes) {
        const peakF = wetBulb || 72;
        const hour = (absoluteMinutes / 60 + 24) % 24;
        // cos(0)=1 at hour=15. Range scales with peak.
        const swing = peakF > 75 ? 10 : 6;
        const factor = Math.cos(((hour - 15) / 24) * 2 * Math.PI);
        return Math.round(peakF - (swing / 2) * (1 - factor));
      }
      function flagForWetBulb(wbF) {
        if (wbF < 80) return 'white';
        if (wbF < 85) return 'green';
        if (wbF < 88) return 'yellow';
        if (wbF < 90) return 'red';
        return 'black';
      }
      // Haversine — local copy to avoid a cyclic ref. Used only in preview mode
      // to convert cumulative geo-distance into a simulated journey clock.
      function haversineMetersLatLng(p1, p2) {
        const R = 6371e3;
        const phi1 = (p1.lat * Math.PI) / 180;
        const phi2 = (p2.lat * Math.PI) / 180;
        const dPhi = ((p2.lat - p1.lat) * Math.PI) / 180;
        const dLambda = ((p2.lng - p1.lng) * Math.PI) / 180;
        const a =
          Math.sin(dPhi / 2) * Math.sin(dPhi / 2) +
          Math.cos(phi1) * Math.cos(phi2) * Math.sin(dLambda / 2) * Math.sin(dLambda / 2);
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      }

      let spatialData = { origin: null, waypoints: [], headingNote: 'None', directionsPath: [], navigationArrows: [], sunSamples: [] };
      try {
        const rawSpatial = urlParams.get('spatial');
        if (rawSpatial) spatialData = { ...spatialData, ...JSON.parse(rawSpatial) };
      } catch (e) {
        console.error('Failed to parse spatial data', e);
      }

      let coolingStops = [];
      try {
        const rawStops = urlParams.get('stops');
        if (rawStops) coolingStops = JSON.parse(rawStops);
      } catch (e) {
        console.error('Failed to parse stops', e);
      }

      let suggestedBreaks = [];
      try {
        const rawBreaks = urlParams.get('breaks');
        if (rawBreaks) suggestedBreaks = JSON.parse(rawBreaks);
      } catch (e) {
        console.error('Failed to parse breaks', e);
      }

      const flagColors = {
        white: { hex: 0x9aa0a6, stringColor: '#9aa0a6', label: 'WHITE' },
        green: { hex: 0x34a853, stringColor: '#34a853', label: 'GREEN' },
        yellow: { hex: 0xfbbc05, stringColor: '#fbbc05', label: 'YELLOW' },
        red: { hex: 0xea4335, stringColor: '#ea4335', label: 'RED' },
        black: { hex: 0x202124, stringColor: '#ffffff', label: 'BLACK' }
      };
      let flagInfo = flagColors[flagRule] || flagColors.white;

      // -- Lat/lng projection helpers used by every overlay ------------------------------------
      let projector = null; // { lat0, lng0, scale, centerX, centerZ }
      function project(lat, lng) {
        if (!projector) return new THREE.Vector3(0, 0, 0);
        const dx = (lng - projector.lng0) * projector.lngToX;
        const dz = (lat - projector.lat0) * projector.latToZ;
        return new THREE.Vector3(
          (dx - projector.centerX) * projector.scale,
          0,
          (dz - projector.centerZ) * projector.scale
        );
      }

      // -- Main script --------------------------------------------------------------------------
      class MainScript extends xb.Script {
        init() {
          this.add(new THREE.HemisphereLight(0xffffff, 0x444444, 2.5));
          const dirLight = new THREE.DirectionalLight(0xffffff, 2.0);
          dirLight.position.set(2, 5, 2);
          this.add(dirLight);

          this.routeNodes = [];
          this.breakBeacons = [];
          this.groundArrows = [];
          this.shadeSegments = [];

          this.routeGroup = new THREE.Group();
          this.add(this.routeGroup);

          this.buildWebcamBackground();
          this.buildFloor();
          this.buildSpatialCoordinates();
          this.buildShadeOverlay();
          this.buildGroundArrows();
          this.buildBreakBeacons();
          this.createControlPanel();
          this.createHeadingPanel();
          this.createWatchPanel();

          this.animationTime = 0;

          // Experience-mode state ------------------------------------------------
          // Preview mode: cycles through every interesting node every PREVIEW_CADENCE_S
          // seconds, scaling it up + showing a banner label. Pure visual; no nav.
          // Live mode: drops a pulsing "you are here" beacon at the user's GPS
          // location, projected into the route's local coordinate frame.
          this.previewIndex = 0;
          this.previewNextSwitchAt = 0;
          this.previewHighlightNode = null;
          this.previewCycleSecs = 3.0;
          this.liveBeacon = null;
          this.liveAccuracy = null;

          this.initExperienceMode();

          // Listen for live ticks from the host page.
          window.addEventListener('message', e => {
            const d = e?.data;
            if (!d || d.kind !== 'heat-threshold/live-tick') return;
            this.applyLiveTick(d);
          });
        }

        // ------------------------------------------------------------------------------------
        // Experience-mode bootstrap. Static is the default (gentle auto-rotate);
        // 'preview' kicks off a cinematic cycle; 'live' requests geolocation.
        // ------------------------------------------------------------------------------------
        initExperienceMode() {
          if (xrMode === 'preview') {
            this.buildPreviewBanner();
            // Stop the gentle auto-rotate so the camera/group orientation comes
            // entirely from the cinematic sequencer.
            this.routeGroup.rotation.y = 0;
            return;
          }
          if (xrMode === 'live') {
            this.buildLiveStatusPanel();
            this.startLiveTracking();
            return;
          }
        }

        // Visible target list used by preview mode — origin, waypoints, refuges,
        // and break beacons, each tagged with lat/lng and cumulative geographic
        // distance from origin. Walking the source data (instead of just iterating
        // routeNodes) means the order matches buildSpatialCoordinates exactly
        // AND we get the GPS coords needed for the simulated journey clock.
        previewTargets() {
          if (this._cachedPreviewTargets) return this._cachedPreviewTargets;

          const targets = [];
          if (!spatialData.origin) return [];

          const origin = spatialData.origin;
          targets.push({
            mesh: this.routeNodes[0],
            lat: origin.lat,
            lng: origin.lng,
            label: origin.label,
            kind: 'origin',
            details: 'Line Departure Point'
          });
          (spatialData.waypoints || []).forEach((wp, i) => {
            targets.push({
              mesh: this.routeNodes[1 + i],
              lat: wp.lat,
              lng: wp.lng,
              label: wp.label,
              kind: 'waypoint',
              details: `Waypoint #${i + 1}`
            });
          });
          coolingStops.forEach((stop, i) => {
            targets.push({
              mesh: this.routeNodes[1 + (spatialData.waypoints || []).length + i],
              lat: stop.lat,
              lng: stop.lng,
              label: stop.name,
              kind: 'refuge',
              details: stop.why || 'Hydration / shade refuge'
            });
          });
          suggestedBreaks.forEach((b, i) => {
            const beacon = this.breakBeacons[i];
            if (!beacon) return;
            targets.push({
              mesh: beacon.orb,
              lat: b.lat,
              lng: b.lng,
              label: beacon.orb.userData.label || `Break ${i + 1}`,
              kind: 'break',
              details: `${b.label} · +${b.timeOffsetMinutes}min · ${b.durationMinutes}min`,
              timeOffsetMinutes: b.timeOffsetMinutes
            });
          });

          // Compute cumulative-from-origin distance + simulated arrival clock.
          let cumMeters = 0;
          for (let i = 0; i < targets.length; i++) {
            if (i > 0) {
              cumMeters += haversineMetersLatLng(
                { lat: targets[i - 1].lat, lng: targets[i - 1].lng },
                { lat: targets[i].lat, lng: targets[i].lng }
              );
            }
            targets[i].cumulativeMeters = Math.round(cumMeters);
            // Prefer the agent-provided timeOffsetMinutes for break beacons since
            // those include the rest-duration accumulation; everything else uses
            // simple pace × distance.
            const minutesFromStart = targets[i].timeOffsetMinutes != null
              ? targets[i].timeOffsetMinutes
              : Math.round(cumMeters / PACE_MPS / 60);
            const absoluteMinutes = journeyStartMinutes + minutesFromStart;
            targets[i].minutesFromStart = minutesFromStart;
            targets[i].arrivalClock = formatMinutesToClock(absoluteMinutes);
            const projectedWb = projectWetBulbAt(absoluteMinutes);
            targets[i].projectedWetBulbF = projectedWb;
            targets[i].projectedFlag = flagForWetBulb(projectedWb);
          }

          this._cachedPreviewTargets = targets;
          return targets;
        }

        buildPreviewBanner() {
          // Three-row status panel: title, current stop, simulated clock + WBGT.
          this.previewPanel = new xb.SpatialPanel({
            width: 1.15, height: 0.28, backgroundColor: '#0f172af2', useDefaultPosition: false
          });
          const grid = this.previewPanel.addGrid();
          grid.addRow({ weight: 0.28 }).addText({
            text: `◆ JOURNEY PREVIEW · ${isBiking ? 'BIKING' : 'WALKING'} @ ${PACE_MPS.toFixed(1)} m/s`,
            fontColor: '#fbbc05', fontSize: 0.034, textAlign: 'center'
          });
          this.previewBannerText = grid.addRow({ weight: 0.4 }).addText({
            text: 'Simulating your trip…',
            fontColor: '#ffffff', fontSize: 0.034, textAlign: 'center'
          });
          this.previewHeatText = grid.addRow({ weight: 0.32 }).addText({
            text: `Start ${formatMinutesToClock(journeyStartMinutes)} · forecast peak ${wetBulb}°F WBGT (${flagRule.toUpperCase()})`,
            fontColor: '#94a3b8', fontSize: 0.028, textAlign: 'center'
          });
          this.previewPanel.position.set(0, 1.95, -1.6);
          this.add(this.previewPanel);
        }

        tickPreview() {
          if (this.animationTime < this.previewNextSwitchAt) return;
          const targets = this.previewTargets();
          if (targets.length === 0) return;

          // Restore the previously-highlighted mesh
          if (this.previewHighlightNode) {
            this.previewHighlightNode.scale.setScalar(1.0);
            if (this.previewHighlightNode.material?.emissiveIntensity != null) {
              this.previewHighlightNode.material.emissiveIntensity = 0.25;
            }
            // Restore the node's original color (we tinted it by projected flag)
            const orig = this.previewHighlightNode.userData?.originalColor;
            if (orig != null && this.previewHighlightNode.material?.color) {
              this.previewHighlightNode.material.color.setHex(orig);
              if (this.previewHighlightNode.material.emissive) {
                this.previewHighlightNode.material.emissive.setHex(orig);
              }
            }
          }

          const t = targets[this.previewIndex % targets.length];
          this.previewIndex = (this.previewIndex + 1) % targets.length;
          this.previewNextSwitchAt = this.animationTime + this.previewCycleSecs;

          // Tint the mesh by the projected flag at the simulated arrival time
          // so the cycle visually shows heat rising as the journey progresses.
          const flagHex = (flagColors[t.projectedFlag] || flagColors.white).hex;
          if (t.mesh.material?.color) {
            t.mesh.material.color.setHex(flagHex);
            if (t.mesh.material.emissive) {
              t.mesh.material.emissive.setHex(flagHex);
            }
          }
          t.mesh.scale.setScalar(1.6);
          if (t.mesh.material?.emissiveIntensity != null) {
            t.mesh.material.emissiveIntensity = 1.0;
          }
          this.previewHighlightNode = t.mesh;

          // Announce in the panel — current stop + arrival clock + projected WBGT
          const kindGlyph = {
            origin: '◉',
            waypoint: '◆',
            refuge: '✚',
            break: '💧'
          }[t.kind] || '•';
          const distanceLabel = t.cumulativeMeters >= 1000
            ? `${(t.cumulativeMeters / 1000).toFixed(1)} km`
            : `${t.cumulativeMeters} m`;
          if (this.previewBannerText?.setText) {
            this.previewBannerText.setText(`${kindGlyph} ${t.label.toUpperCase()}\n+${t.minutesFromStart}min · ${distanceLabel} from start`);
          }
          if (this.previewHeatText?.setText) {
            const flagLabel = t.projectedFlag.toUpperCase();
            this.previewHeatText.setText(`Arrive ${t.arrivalClock} · projected ${t.projectedWetBulbF}°F WBGT · ${flagLabel} FLAG`);
          }

          // Aim the group's Y rotation so the target ends up at -Z (front).
          const targetAngle = Math.atan2(t.mesh.position.x, -t.mesh.position.z);
          this.previewTargetGroupY = -targetAngle;

          // Voice the rising-heat moments: speak the flag if it differs from
          // the previous tick. Powerful demo beat without manual narration.
          if (t.projectedFlag !== this.previousProjectedFlag && this.previousProjectedFlag != null) {
            const msg = `Flag rising to ${t.projectedFlag} at ${t.label}, ${t.projectedWetBulbF} degrees wet bulb.`;
            try {
              if (xb.core.sound.speechSynthesizer) {
                xb.core.sound.speechSynthesizer.speak(msg);
              } else if (window.speechSynthesis) {
                window.speechSynthesis.speak(new SpeechSynthesisUtterance(msg));
              }
            } catch { /* ignore */ }
          }
          this.previousProjectedFlag = t.projectedFlag;

          xb.core.sound.soundSynthesizer.playPresetTone('CLICK', 0.4);
        }

        // ------------------------------------------------------------------------------------
        // Live activity mode — geolocation beacon + current/projected heat readout
        // ------------------------------------------------------------------------------------
        buildLiveStatusPanel() {
          this.livePanel = new xb.SpatialPanel({
            width: 1.2, height: 0.4, backgroundColor: '#0f172af2', useDefaultPosition: false
          });
          const grid = this.livePanel.addGrid();
          grid.addRow({ weight: 0.22 }).addText({
            text: '● LIVE ACTIVITY MODE',
            fontColor: '#ea4335', fontSize: 0.038, textAlign: 'center'
          });
          this.liveStatusText = grid.addRow({ weight: 0.3 }).addText({
            text: 'Requesting GPS permission…',
            fontColor: '#ffffff', fontSize: 0.032, textAlign: 'center'
          });
          // Two-line readout: current conditions, then projected at next refuge.
          this.liveNowText = grid.addRow({ weight: 0.24 }).addText({
            text: '',
            fontColor: '#cbd5e1', fontSize: 0.028, textAlign: 'center'
          });
          this.liveProjectionText = grid.addRow({ weight: 0.24 }).addText({
            text: '',
            fontColor: '#94a3b8', fontSize: 0.026, textAlign: 'center'
          });
          this.livePanel.position.set(0, 1.95, -1.6);
          this.add(this.livePanel);
        }

        startLiveTracking() {
          if (!navigator.geolocation) {
            this.liveStatusText?.setText?.('Geolocation unavailable on this browser.');
            return;
          }
          const onPosition = (pos) => {
            const { latitude, longitude, accuracy } = pos.coords;
            this.placeLiveBeacon(latitude, longitude, accuracy);
          };
          const onError = (err) => {
            this.liveStatusText?.setText?.(`GPS error: ${err.message}. Stand outdoors and reload.`);
          };
          navigator.geolocation.getCurrentPosition(onPosition, onError, {
            enableHighAccuracy: true, timeout: 8000, maximumAge: 0
          });
          this.liveWatchId = navigator.geolocation.watchPosition(onPosition, onError, {
            enableHighAccuracy: true, timeout: 12000, maximumAge: 4000
          });
        }

        placeLiveBeacon(lat, lng, accuracyM) {
          if (!projector) return;
          // Project the user's GPS into the routeGroup local frame for the visual.
          const pos = (function () {
            const dx = (lng - projector.lng0) * projector.lngToX;
            const dz = (lat - projector.lat0) * projector.latToZ;
            return new THREE.Vector3(
              (dx - projector.centerX) * projector.scale,
              0,
              (dz - projector.centerZ) * projector.scale
            );
          })();

          // Lazily build beacon meshes on first GPS lock.
          if (!this.liveBeacon) {
            const orb = new THREE.Mesh(
              new THREE.SphereGeometry(0.05, 24, 12),
              new THREE.MeshPhongMaterial({
                color: 0xea4335, emissive: 0xea4335,
                emissiveIntensity: 0.85, transparent: true, opacity: 0.95
              })
            );
            const ring = new THREE.Mesh(
              new THREE.RingGeometry(0.07, 0.085, 24),
              new THREE.MeshBasicMaterial({ color: 0xea4335, side: THREE.DoubleSide, transparent: true, opacity: 0.6 })
            );
            ring.rotation.x = -Math.PI / 2;
            this.routeGroup.add(orb);
            this.routeGroup.add(ring);
            this.liveBeacon = { orb, ring };
          }
          this.liveBeacon.orb.position.copy(pos).setY(0.06);
          this.liveBeacon.ring.position.copy(pos).setY(0.01);
          this.liveLastFix = { lat, lng, accuracyM, at: Date.now() };

          this.refreshLiveReadout();
        }

        // Refreshes the heat readout. Called on every GPS fix AND on every
        // applyLiveTick() so the panel stays current even if the user is
        // standing still while the wet-bulb climbs.
        refreshLiveReadout() {
          if (!this.liveLastFix) return;
          const { lat, lng, accuracyM } = this.liveLastFix;

          // ---- Current conditions: project wet-bulb at the wall clock now ----
          const nowD = new Date();
          const nowMinutes = nowD.getHours() * 60 + nowD.getMinutes();
          const currentWetBulb = projectWetBulbAt(nowMinutes);
          const currentFlag = flagForWetBulb(currentWetBulb);
          const currentFlagInfo = flagColors[currentFlag] || flagColors.white;

          // Color the ring under the beacon by the CURRENT flag.
          if (this.liveBeacon?.ring?.material) {
            this.liveBeacon.ring.material.color.setHex(currentFlagInfo.hex);
          }

          // ---- Find nearest refuge (real meters via haversine) ---------------
          const refugePool = [
            ...coolingStops.map(s => ({ lat: s.lat, lng: s.lng, label: s.name, kind: 'refuge' })),
            ...suggestedBreaks.map((b, i) => ({
              lat: b.lat, lng: b.lng,
              label: this.breakBeacons[i]?.orb?.userData?.label || `Break ${i + 1}`,
              kind: 'break'
            }))
          ];
          let nearest = null;
          let nearestMeters = Infinity;
          for (const r of refugePool) {
            const d = haversineMetersLatLng({ lat, lng }, { lat: r.lat, lng: r.lng });
            if (d < nearestMeters) { nearestMeters = d; nearest = r; }
          }

          // ---- Projected conditions at ETA on the nearest refuge -------------
          let projected = null;
          if (nearest) {
            const etaMinutesFromNow = nearestMeters / PACE_MPS / 60;
            const etaAbsoluteMinutes = nowMinutes + etaMinutesFromNow;
            const etaWetBulb = projectWetBulbAt(etaAbsoluteMinutes);
            const etaFlag = flagForWetBulb(etaWetBulb);
            projected = {
              label: nearest.label,
              meters: Math.round(nearestMeters),
              etaClock: formatMinutesToClock(etaAbsoluteMinutes),
              etaMin: Math.round(etaMinutesFromNow),
              wetBulb: etaWetBulb,
              flag: etaFlag,
              flagHex: (flagColors[etaFlag] || flagColors.white).hex
            };
          }

          // ---- Update the panel text -----------------------------------------
          this.liveStatusText?.setText?.(
            `GPS locked (±${Math.round(accuracyM)}m)`
          );
          this.liveNowText?.setText?.(
            `NOW · ${currentWetBulb}°F WBGT · ${currentFlag.toUpperCase()} FLAG`
          );
          if (projected) {
            const distStr = projected.meters >= 1000
              ? `${(projected.meters / 1000).toFixed(2)} km`
              : `${projected.meters} m`;
            this.liveProjectionText?.setText?.(
              `↗ ${projected.label}: ${distStr}, ETA ${projected.etaClock} (${projected.etaMin}min) · ${projected.wetBulb}°F ${projected.flag.toUpperCase()}`
            );
          } else {
            this.liveProjectionText?.setText?.('No refuges loaded for this route.');
          }

          // ---- Voice alert when entering yellow/red/black -------------------
          if (currentFlag !== this.liveLastFlag && this.liveLastFlag != null) {
            const escalating = ['white', 'green', 'yellow', 'red', 'black'].indexOf(currentFlag)
                             > ['white', 'green', 'yellow', 'red', 'black'].indexOf(this.liveLastFlag);
            if (escalating && (currentFlag === 'yellow' || currentFlag === 'red' || currentFlag === 'black')) {
              const msg = `Heat alert. Conditions have risen to ${currentFlag} flag, ${currentWetBulb} degrees wet bulb. ${projected ? `Nearest refuge ${projected.label}, ${projected.meters} meters away.` : ''}`;
              try {
                if (xb.core.sound.speechSynthesizer) {
                  xb.core.sound.speechSynthesizer.speak(msg);
                } else if (window.speechSynthesis) {
                  window.speechSynthesis.speak(new SpeechSynthesisUtterance(msg));
                }
              } catch { /* ignore */ }
            }
          }
          this.liveLastFlag = currentFlag;
        }

        // ------------------------------------------------------------------------------------
        // Webcam-as-background — desktop preview shows the user's real environment.
        // In AR sessions the device handles passthrough natively, so we hide the plane
        // once a session starts (via sessionstart/sessionend events on the THREE.WebXRManager).
        // ------------------------------------------------------------------------------------
        async buildWebcamBackground() {
          if (!navigator.mediaDevices?.getUserMedia) return;
          let stream;
          try {
            stream = await navigator.mediaDevices.getUserMedia({
              video: { facingMode: 'environment' },
              audio: false
            });
          } catch (err) {
            console.warn('[XR] Webcam unavailable, keeping default backdrop:', err.message);
            return;
          }

          const video = document.createElement('video');
          video.srcObject = stream;
          video.muted = true;
          video.playsInline = true;
          video.autoplay = true;
          try { await video.play(); } catch (e) { /* will play on first frame */ }

          const texture = new THREE.VideoTexture(video);
          texture.colorSpace = THREE.SRGBColorSpace;

          // Large plane far behind the scene, oriented to face the camera.
          // Sized to cover a wide FOV from the user's resting head position.
          const plane = new THREE.Mesh(
            new THREE.PlaneGeometry(40, 24),
            new THREE.MeshBasicMaterial({ map: texture, depthWrite: false, side: THREE.DoubleSide })
          );
          plane.position.set(0, 1.5, -8);
          plane.renderOrder = -1000;
          this.bgPlane = plane;
          this.add(plane);

          // Hide the webcam plane during AR sessions so device passthrough is unobscured.
          const renderer = xb.core?.renderer || xb.core?.scene?.renderer || xb.renderer;
          if (renderer?.xr?.addEventListener) {
            renderer.xr.addEventListener('sessionstart', () => { plane.visible = false; });
            renderer.xr.addEventListener('sessionend', () => { plane.visible = true; });
          }
        }

        // ------------------------------------------------------------------------------------
        // Floor-anchored Google Static Maps satellite tile with the route polyline burned in.
        // Sits like a coffee-table map ~1.2m in front of the user.
        // ------------------------------------------------------------------------------------
        buildFloorMap() {
          if (!gmpKey || !spatialData.origin) return;

          const allPts = [
            { lat: spatialData.origin.lat, lng: spatialData.origin.lng },
            ...(spatialData.waypoints || []).map(w => ({ lat: w.lat, lng: w.lng })),
            ...coolingStops.map(s => ({ lat: s.lat, lng: s.lng }))
          ];
          if (allPts.length === 0) return;

          const pathStr = allPts.map(p => `${p.lat},${p.lng}`).join('|');
          const originMarker = `markers=color:blue%7Clabel:O%7C${spatialData.origin.lat},${spatialData.origin.lng}`;
          const wpMarkers = (spatialData.waypoints || [])
            .map((w, i) => `markers=color:red%7Clabel:${i + 1}%7C${w.lat},${w.lng}`)
            .join('&');
          const stopMarkers = coolingStops
            .map(s => `markers=color:green%7Clabel:C%7C${s.lat},${s.lng}`)
            .join('&');

          const params = [
            `size=640x640`,
            `scale=2`,
            `maptype=satellite`,
            `path=color:0x6366f1ff%7Cweight:5%7C${encodeURIComponent(pathStr)}`,
            originMarker,
            wpMarkers,
            stopMarkers,
            `key=${encodeURIComponent(gmpKey)}`
          ].filter(Boolean).join('&');

          const url = `https://maps.googleapis.com/maps/api/staticmap?${params}`;

          new THREE.TextureLoader().load(
            url,
            (texture) => {
              texture.colorSpace = THREE.SRGBColorSpace;
              const mapPlane = new THREE.Mesh(
                new THREE.PlaneGeometry(1.6, 1.6),
                new THREE.MeshBasicMaterial({ map: texture, transparent: true, opacity: 0.95, side: THREE.DoubleSide })
              );
              // Lay flat on the floor, 1.2m in front of the user, just above ground.
              mapPlane.rotation.x = -Math.PI / 2;
              mapPlane.position.set(0, 0.02, -1.2);
              this.add(mapPlane);
              this.floorMap = mapPlane;
            },
            undefined,
            (err) => console.warn('[XR] Floor map failed to load:', err)
          );
        }

        // ------------------------------------------------------------------------------------
        // Floor dispatcher — try Photorealistic 3D Tiles first; fall back to flat satellite
        // if construction fails (network, Map Tiles API not enabled, etc.) or if the user
        // explicitly requested flat via ?tiles=flat.
        // ------------------------------------------------------------------------------------
        buildFloor() {
          if (urlParams.get('tiles') === 'flat') {
            this.buildFloorMap();
            return;
          }
          try {
            this.build3DTilesFloor();
          } catch (err) {
            console.warn('[XR] 3D Tiles init failed, falling back to flat satellite:', err);
            this.buildFloorMap();
          }
        }

        // ------------------------------------------------------------------------------------
        // Photorealistic 3D Tiles floor — Google's Map Tiles API rendered as a floor table.
        // Needs:
        //   - gmpKey URL param with Map Tiles API enabled in the GCP project
        //   - xb.core.camera + xb.core.renderer (set by xrblocks after init)
        // Tile geometry arrives at Earth scale; we scale tiles.group down ~1000× so ~1km of
        // terrain occupies ~1m on the floor.
        // ------------------------------------------------------------------------------------
        build3DTilesFloor() {
          if (!gmpKey || !spatialData.origin) return;

          const latRad = spatialData.origin.lat * THREE.MathUtils.DEG2RAD;
          const lonRad = spatialData.origin.lng * THREE.MathUtils.DEG2RAD;

          const tiles = new TilesRenderer();
          tiles.registerPlugin(new GoogleCloudAuthPlugin({ apiToken: gmpKey, autoRefreshToken: true }));
          tiles.registerPlugin(new ReorientationPlugin({ lat: latRad, lon: lonRad }));
          tiles.registerPlugin(new TileCompressionPlugin());
          tiles.registerPlugin(new TilesFadePlugin());

          // Tighten LOD so the small-on-floor render still pulls reasonable tile detail.
          tiles.errorTarget = 12;

          // Anchor the tile group on the floor, in front of the user, sized like a coffee table.
          const group = tiles.group;
          group.scale.setScalar(0.001);
          group.position.set(0, 0.02, -1.2);
          this.add(group);

          // Warn (don't throw) when downloads fail so flat fallback isn't triggered for
          // transient network blips.
          tiles.addEventListener?.('load-error', (e) => console.warn('[XR] tile load error:', e));

          this.tiles3D = tiles;
        }

        // ------------------------------------------------------------------------------------
        // Dispose the current floor representation and rebuild from current spatialData.
        // Called by applyLiveTick when the live watch carries new spatial data.
        // ------------------------------------------------------------------------------------
        rebuildFloorMap() {
          if (this.floorMap) {
            this.remove(this.floorMap);
            this.floorMap.material.map?.dispose();
            this.floorMap.material.dispose();
            this.floorMap.geometry.dispose();
            this.floorMap = null;
          }
          if (this.tiles3D) {
            this.remove(this.tiles3D.group);
            this.tiles3D.dispose?.();
            this.tiles3D = null;
          }
          this.buildFloor();
        }

        // ------------------------------------------------------------------------------------
        // Coordinate projection + node rendering (origin, waypoints, cooling stops)
        // ------------------------------------------------------------------------------------
        buildSpatialCoordinates() {
          if (!spatialData.origin) {
            this.buildFallbackDesign();
            return;
          }

          const origin = spatialData.origin;
          const lat0 = origin.lat;
          const lng0 = origin.lng;
          const latToZ = -111320;
          const lngToX = 111320 * Math.cos((lat0 * Math.PI) / 180);

          const coords = [];
          coords.push({ label: origin.label, lat: origin.lat, lng: origin.lng, type: 'origin', details: 'Line Departure Point' });
          (spatialData.waypoints || []).forEach((wp, idx) => {
            coords.push({ label: wp.label, lat: wp.lat, lng: wp.lng, type: 'waypoint', details: `Waypoint Location #${idx + 1}` });
          });
          coolingStops.forEach((stop, idx) => {
            coords.push({
              label: stop.name,
              lat: stop.lat,
              lng: stop.lng,
              type: 'coolingStop',
              details: `Grounded Cooling/Hydration Point: ${stop.why}`,
              streetViewUri: stop.streetViewUri
            });
          });

          // Bounding box across every renderable lat/lng (including breaks + path) so the
          // ground arrows and shade segments share the same scale as the nodes.
          const everyLatLng = coords.map(c => ({ lat: c.lat, lng: c.lng }))
            .concat(suggestedBreaks.map(b => ({ lat: b.lat, lng: b.lng })))
            .concat((spatialData.directionsPath || []).map(p => ({ lat: p.lat, lng: p.lng })));

          let minDX = Infinity, maxDX = -Infinity, minDZ = Infinity, maxDZ = -Infinity;
          everyLatLng.forEach(p => {
            const dx = (p.lng - lng0) * lngToX;
            const dz = (p.lat - lat0) * latToZ;
            if (dx < minDX) minDX = dx;
            if (dx > maxDX) maxDX = dx;
            if (dz < minDZ) minDZ = dz;
            if (dz > maxDZ) maxDZ = dz;
          });
          const centerX = (minDX + maxDX) / 2;
          const centerZ = (minDZ + maxDZ) / 2;
          const spanX = (maxDX - minDX) || 0.1;
          const spanZ = (maxDZ - minDZ) || 0.1;
          const maxSpan = Math.max(spanX, spanZ);
          const scale = 1.0 / maxSpan;

          projector = { lat0, lng0, latToZ, lngToX, centerX, centerZ, scale };

          // Holographic grid
          const gridHelper = new THREE.GridHelper(1.5, 12, 0x475569, 0x334155);
          gridHelper.position.set(0, -0.2, 0);
          this.routeGroup.add(gridHelper);

          // True-north reference rose so users can orient relative to bearings.
          this.addNorthRose();

          // Place nodes
          coords.forEach(coord => {
            const pos = project(coord.lat, coord.lng);

            let size = 0.045, color = 0xf59e0b;
            if (coord.type === 'origin') { size = 0.06; color = 0x3b82f6; }
            else if (coord.type === 'coolingStop') { size = 0.055; color = 0x10b981; }

            const geom = new THREE.SphereGeometry(size, 32, 16);
            const mat = new THREE.MeshPhongMaterial({
              color, emissive: color, emissiveIntensity: 0.25,
              transparent: true, opacity: 0.9, shininess: 90
            });
            const mesh = new THREE.Mesh(geom, mat);
            mesh.position.copy(pos);
            mesh.name = coord.label;
            mesh.ignoreReticleRaycast = false;
            mesh.userData = {
              label: coord.label, type: coord.type, details: coord.details,
              originalColor: color, streetViewUri: coord.streetViewUri
            };
            this.routeGroup.add(mesh);
            this.routeNodes.push(mesh);

            const ringGeom = new THREE.RingGeometry(size * 1.2, size * 1.5, 16);
            ringGeom.rotateX(-Math.PI / 2);
            const ringMat = new THREE.MeshBasicMaterial({ color, side: THREE.DoubleSide, transparent: true, opacity: 0.5 });
            const ringMesh = new THREE.Mesh(ringGeom, ringMat);
            ringMesh.position.copy(pos);
            this.routeGroup.add(ringMesh);
            mesh.userData.ring = ringMesh;
          });

          // Connect waypoints sequentially with holographic projection lines (kept for compass clarity)
          const waypointSeq = coords.filter(c => c.type === 'origin' || c.type === 'waypoint');
          for (let i = 0; i < waypointSeq.length - 1; i++) {
            this.drawHologramLine(project(waypointSeq[i].lat, waypointSeq[i].lng), project(waypointSeq[i + 1].lat, waypointSeq[i + 1].lng));
          }

          this.routeGroup.position.set(0, 1.4, -1.8);
        }

        addNorthRose() {
          // Small "N" tick at +Z forward = -Z in three (we keep latToZ negative so north is -Z).
          const arrow = new THREE.Mesh(
            new THREE.ConeGeometry(0.018, 0.05, 6),
            new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.85 })
          );
          arrow.position.set(0, -0.18, -0.6);
          arrow.rotation.x = -Math.PI / 2;
          this.routeGroup.add(arrow);
        }

        drawHologramLine(p1, p2) {
          const distance = p1.distanceTo(p2);
          if (distance < 1e-4) return;
          const geom = new THREE.CylinderGeometry(0.008, 0.008, distance, 8);
          geom.rotateX(Math.PI / 2);
          const mat = new THREE.MeshBasicMaterial({ color: 0x6366f1, transparent: true, opacity: 0.65 });
          const mesh = new THREE.Mesh(geom, mat);
          mesh.position.copy(p1).add(p2).multiplyScalar(0.5);
          mesh.lookAt(p2);
          this.routeGroup.add(mesh);
        }

        // ------------------------------------------------------------------------------------
        // SunPathSubAgent overlay — color directionsPath segments by shade factor
        // ------------------------------------------------------------------------------------
        buildShadeOverlay() {
          const path = spatialData.directionsPath || [];
          const samples = spatialData.sunSamples || [];
          if (!projector || path.length < 2 || samples.length === 0) return;

          // For each segment in path, pick the nearest sun sample by index ratio.
          for (let i = 0; i < path.length - 1; i++) {
            const a = project(path[i].lat, path[i].lng);
            const b = project(path[i + 1].lat, path[i + 1].lng);
            const ratio = i / Math.max(1, path.length - 1);
            const sample = samples[Math.min(samples.length - 1, Math.floor(ratio * samples.length))];
            const shade = sample?.shadeFactor ?? 0.5;
            // High shade => cooler teal, low shade => hot amber
            const color = new THREE.Color().lerpColors(
              new THREE.Color(0xf97316), // sun-baked
              new THREE.Color(0x06b6d4), // shaded
              shade
            );
            const len = a.distanceTo(b);
            if (len < 1e-4) continue;
            const geom = new THREE.CylinderGeometry(0.012, 0.012, len, 8);
            geom.rotateX(Math.PI / 2);
            const mat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.85 });
            const segment = new THREE.Mesh(geom, mat);
            segment.position.copy(a).add(b).multiplyScalar(0.5);
            segment.position.y = -0.02;
            segment.lookAt(b);
            this.routeGroup.add(segment);
            this.shadeSegments.push(segment);
          }
        }

        // ------------------------------------------------------------------------------------
        // NavigationArrowsSubAgent overlay — ground-anchored heading arrows
        // ------------------------------------------------------------------------------------
        buildGroundArrows() {
          const arrows = spatialData.navigationArrows || [];
          if (!projector || arrows.length === 0) return;

          arrows.forEach(arrow => {
            const pos = project(arrow.lat, arrow.lng);
            // Arrow head + shaft, flat on ground
            const group = new THREE.Group();

            const shaftGeom = new THREE.BoxGeometry(0.012, 0.004, 0.06);
            const shaftMat = new THREE.MeshBasicMaterial({ color: 0x1a73e8, transparent: true, opacity: 0.85 });
            const shaft = new THREE.Mesh(shaftGeom, shaftMat);
            shaft.position.z = -0.01;
            group.add(shaft);

            const headGeom = new THREE.ConeGeometry(0.022, 0.045, 4);
            const headMat = new THREE.MeshBasicMaterial({ color: 0x1a73e8, transparent: true, opacity: 0.95 });
            const head = new THREE.Mesh(headGeom, headMat);
            head.rotation.x = -Math.PI / 2;
            head.position.z = -0.05;
            group.add(head);

            // Bearing is degrees from true north, clockwise. North in our scene is -Z.
            // group.rotateY uses CCW for positive Y in three.js, so negate.
            group.rotation.y = -arrow.bearingDeg * Math.PI / 180;
            group.position.copy(pos);
            group.position.y = -0.18;

            group.userData = {
              label: arrow.instruction,
              type: 'arrow',
              details: `${arrow.maneuver.toUpperCase()} — next maneuver in ${arrow.distanceMeters}m`,
              bearingDeg: arrow.bearingDeg
            };
            this.routeGroup.add(group);
            this.groundArrows.push(group);
          });
        }

        // ------------------------------------------------------------------------------------
        // RefugeBreakSubAgent overlay — pulsing water/shade beacons with countdown labels
        // ------------------------------------------------------------------------------------
        buildBreakBeacons() {
          if (!projector || suggestedBreaks.length === 0) return;

          suggestedBreaks.forEach((b, idx) => {
            const pos = project(b.lat, b.lng);
            const color = b.type === 'water' ? 0x0ea5e9 : b.type === 'shade' ? 0x14b8a6 : 0x8b5cf6;

            // Vertical glowing beam to make the break easy to spot from across the scene.
            const beamGeom = new THREE.CylinderGeometry(0.012, 0.012, 0.45, 12);
            const beamMat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.55 });
            const beam = new THREE.Mesh(beamGeom, beamMat);
            beam.position.copy(pos);
            beam.position.y = 0.05;
            this.routeGroup.add(beam);

            // Floating sphere head
            const orbGeom = new THREE.SphereGeometry(0.04, 24, 12);
            const orbMat = new THREE.MeshPhongMaterial({ color, emissive: color, emissiveIntensity: 0.6, transparent: true, opacity: 0.9 });
            const orb = new THREE.Mesh(orbGeom, orbMat);
            orb.position.copy(pos);
            orb.position.y = 0.28;
            orb.userData = {
              label: `${b.type === 'water' ? '💧 Hydration Break' : b.type === 'shade' ? '🌿 Shade Break' : '🪑 Rest Break'} #${idx + 1}`,
              type: 'breakBeacon',
              details: `${b.label} · +${b.timeOffsetMinutes}min · ${b.durationMinutes}min duration`,
              streetViewUri: b.streetViewUri
            };
            this.routeGroup.add(orb);
            this.breakBeacons.push({ beam, orb, breakSpec: b });
          });
        }

        buildFallbackDesign() {
          const gridHelper = new THREE.GridHelper(1.2, 10, 0x10b981, 0x1e293b);
          gridHelper.position.set(0, -0.1, 0);
          this.routeGroup.add(gridHelper);
          const geom = new THREE.TorusGeometry(0.3, 0.02, 16, 100);
          geom.rotateX(Math.PI / 2);
          const mat = new THREE.MeshPhongMaterial({ color: 0x1a73e8, emissive: 0x1a73e8, emissiveIntensity: 0.2 });
          const ring = new THREE.Mesh(geom, mat);
          this.routeGroup.add(ring);
          this.routeGroup.position.set(0, 1.3, -1.5);
        }

        // Panels

        // ------------------------------------------------------------------------------------
        // Live tick handler
        // ------------------------------------------------------------------------------------
        applyLiveTick(tick) {
          wetBulb = tick.wetBulb ?? wetBulb;
          flagRule = tick.flag ?? flagRule;
          verdict = tick.verdict ?? verdict;
          headline = tick.headline ?? headline;
          reasoning = tick.reasoning ?? reasoning;
          flagInfo = flagColors[flagRule] || flagColors.white;

          // If the tick carries fresh route data, refresh the floor map from the new bbox.
          // Today's runWatchTick doesn't include spatial — the hook is here for when it does.
          if (tick.spatial) {
            spatialData = { ...spatialData, ...tick.spatial };
            this.rebuildFloorMap();
          }

          if (this.ratingText?.setText) {
            this.ratingText.setText(`Peak WBGT: ${wetBulb}°F (${flagRule.toUpperCase()} Flag Rated) · LIVE`);
          }
          if (this.detailDisplay?.setText) {
            this.detailDisplay.setText(
              `Verdict: ${verdict.toUpperCase()}\n${headline}\nAnalysis: ${reasoning}\n\n💧 ${suggestedBreaks.length} rest beacons · 🧭 ${(spatialData.navigationArrows || []).length} ground arrows`
            );
          }
          // Live Activity mode: re-run the heat readout so the projected
          // wet-bulb refreshes against the new peak even if the user hasn't moved.
          if (xrMode === 'live') this.refreshLiveReadout();

          if (this.watchStatusText?.setText) {
            const at = new Date(tick.fetchedAt || Date.now()).toLocaleTimeString();
            this.watchStatusText.setText(`Tick @ ${at} · WBGT ${wetBulb}°F · ${flagRule.toUpperCase()}`);
          }

          // Recolor break beacons to reflect escalating severity.
          this.breakBeacons.forEach(({ beam, orb }) => {
            beam.material.color.setHex(flagInfo.hex);
            orb.material.emissive.setHex(flagInfo.hex);
            orb.material.color.setHex(flagInfo.hex);
          });

          xb.core.sound.soundSynthesizer.playPresetTone('CLICK', 0.4);
        }

        toggleThermalAura() {
          xb.core.sound.soundSynthesizer.playPresetTone('BEEP', 0.6);
          this.auraActive = !this.auraActive;
          this.routeNodes.forEach(node => {
            if (this.auraActive) {
              node.material.emissiveIntensity = 0.85;
              node.scale.setScalar(1.2);
              if (node.userData.ring) node.userData.ring.scale.setScalar(1.5);
            } else {
              node.material.emissiveIntensity = 0.25;
              node.scale.setScalar(1.0);
              if (node.userData.ring) node.userData.ring.scale.setScalar(1.0);
            }
          });
          const currentMsg = this.auraActive ? 'Thermal footprint coverage visualizer ACTIVATED.' : 'Thermal footprint coverage visualizer DEACTIVATED.';
          this.detailDisplay.setText(`${currentMsg}\n\nVerdict: ${verdict.toUpperCase()}\n${headline}\nAnalysis: ${reasoning}`);
        }

        readVerdictVoice() {
          const alertSpeech = `Heat Threshold Advisory. Headline: ${headline}. Wet-bulb peak is ${wetBulb} degrees fahrenheit, falling under the ${flagRule} flag. Recommended verdict is to ${verdict}.`;
          xb.core.sound.soundSynthesizer.playPresetTone('CLICK', 0.5);
          if (xb.core.sound.speechSynthesizer) {
            xb.core.sound.speechSynthesizer.speak(alertSpeech);
          } else if (window.speechSynthesis) {
            const utterance = new SpeechSynthesisUtterance(alertSpeech);
            window.speechSynthesis.speak(utterance);
          }
        }

        onSelectStart(event) {
          const controller = event.target;
          for (const node of this.routeNodes) {
            const intersection = xb.core.user.select(node, controller);
            if (intersection) {
              this.routeNodes.forEach(n => {
                n.material.color.setHex(n.userData.originalColor);
                n.material.emissiveIntensity = 0.25;
              });
              node.material.color.setHex(0x06b6d4);
              node.material.emissiveIntensity = 0.8;
              xb.core.sound.soundSynthesizer.playPresetTone('CLICK', 0.8);

              const sv = node.userData.streetViewUri ? `\n\nFirst-person view: ${node.userData.streetViewUri}` : '';
              const textMessage = `📌 SELECTED NODE: ${node.userData.label.toUpperCase()}\n\nRole: ${node.userData.details}${sv}\n\nPeak Heat Stress: ${wetBulb}°F (${flagRule.toUpperCase()} Level)`;
              this.detailDisplay.setText(textMessage);
              return;
            }
          }

          // Also let break beacons be selectable
          for (const { orb } of this.breakBeacons) {
            const intersection = xb.core.user.select(orb, controller);
            if (intersection) {
              const sv = orb.userData.streetViewUri ? `\n\nFirst-person view: ${orb.userData.streetViewUri}` : '';
              this.detailDisplay.setText(`${orb.userData.label}\n\n${orb.userData.details}${sv}`);
              xb.core.sound.soundSynthesizer.playPresetTone('CLICK', 0.7);
              return;
            }
          }
        }

        update() {
          this.animationTime += xb.getDeltaTime();

          // Mode-aware camera/group rotation:
          //   - static: gentle sway (original behavior)
          //   - preview: ease toward the highlighted target's angle
          //   - live: hold the group level so the GPS beacon stays oriented north
          if (xrMode === 'preview') {
            this.tickPreview();
            if (this.previewTargetGroupY != null) {
              const cur = this.routeGroup.rotation.y;
              this.routeGroup.rotation.y = cur + (this.previewTargetGroupY - cur) * 0.04;
            }
          } else if (xrMode === 'live') {
            // Hold north-up. Pulse the live beacon if present.
            this.routeGroup.rotation.y = 0;
            if (this.liveBeacon) {
              const pulse = 1.0 + 0.25 * Math.sin(this.animationTime * 4.0);
              this.liveBeacon.orb.scale.setScalar(pulse);
              this.liveBeacon.ring.scale.setScalar(pulse * 1.15);
            }
            // Clock-driven refresh: re-evaluate the "NOW" projection every
            // 15 seconds so the wet-bulb readout drifts forward as time
            // passes even if the user is standing still and Live Watch is off.
            if (this.liveLastFix && (this.animationTime - (this.liveLastRefreshAt || 0)) > 15) {
              this.liveLastRefreshAt = this.animationTime;
              this.refreshLiveReadout();
            }
          } else {
            this.routeGroup.rotation.y = 0.05 * Math.sin(this.animationTime * 0.2);
          }

          // Drive Photorealistic 3D Tiles loading + LOD selection. Camera/renderer are
          // populated by xrblocks shortly after init, so we re-check each frame.
          if (this.tiles3D && xb.core?.camera && xb.core?.renderer) {
            this.tiles3D.setCamera(xb.core.camera);
            this.tiles3D.setResolutionFromRenderer(xb.core.camera, xb.core.renderer);
            xb.core.camera.updateMatrixWorld();
            this.tiles3D.update();
          }

          // Pulse route node rings
          const scale = 1.0 + 0.15 * Math.sin(this.animationTime * 3.0);
          this.routeNodes.forEach(node => {
            if (node.userData.ring) {
              if (this.auraActive) node.userData.ring.scale.setScalar(scale * 1.5);
              else node.userData.ring.scale.setScalar(scale);
            }
          });

          // Pulse break beacons independently — faster cadence = more urgency
          const breakPulse = 1.0 + 0.25 * Math.sin(this.animationTime * 5.0);
          this.breakBeacons.forEach(({ orb, beam }) => {
            orb.scale.setScalar(breakPulse);
            beam.material.opacity = 0.35 + 0.25 * Math.sin(this.animationTime * 4.0);
          });

          // Travel pulse along ground arrows: opacity wave so they appear to chase the user forward.
          this.groundArrows.forEach((arrow, idx) => {
            const phase = (this.animationTime * 2 - idx * 0.25) % 2;
            const wave = phase < 1 ? phase : 2 - phase;
            arrow.children.forEach(c => { if (c.material) c.material.opacity = 0.5 + 0.5 * wave; });
          });
        }
      }

      document.addEventListener('DOMContentLoaded', function () {
        const options = new xb.Options();
        options.enableUI();
        options.enableReticles();
        options.enableControllers();
        options.sound.speechSynthesizer.enabled = true;
        options.xrButton.showEnterSimulatorButton = false;

        xb.add(new MainScript());
        xb.init(options);
      });
    </script>
  </body>
</html>
